name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git add package.json package-lock.json
          git commit -m "release: v$NEW_VERSION [skip ci]"
          git pull --rebase origin main
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI bundle
        run: npm run build:cli

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build binaries
        run: |
          mkdir -p dist/bin
          pkg dist/package.json --targets node20-macos-arm64   --output dist/bin/simplesetup-macos-arm64
          pkg dist/package.json --targets node20-macos-x64     --output dist/bin/simplesetup-macos-x64
          pkg dist/package.json --targets node20-linux-x64     --output dist/bin/simplesetup-linux-x64
          pkg dist/package.json --targets node20-linux-arm64   --output dist/bin/simplesetup-linux-arm64
          pkg dist/package.json --targets node20-win-x64       --output dist/bin/simplesetup-win-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          files: dist/bin/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
